<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta Comercial — Escalar BPO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f0ece6;color:#1a1a1a;}
.nav{background:#1f2d32;border-bottom:3px solid #009d94;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nlogo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.06em;}.nlogo span{color:#009d94;}
.nsub{font-family:'Playfair Display',serif;font-size:10px;color:rgba(255,255,255,.32);font-style:italic;margin-top:1px;}
.nbtn{background:#009d94;color:#1f2d32;border:none;border-radius:5px;padding:8px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.gbtn{background:transparent;color:#009d94;border:1.5px solid #009d94;border-radius:5px;padding:7px 15px;font-weight:600;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.dbtn{background:transparent;color:#dc2626;border:1.5px solid rgba(220,38,38,.3);border-radius:5px;padding:7px 12px;font-weight:600;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sbtn{background:transparent;color:#555;border:1.5px solid #ddd;border-radius:5px;padding:7px 13px;font-weight:600;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.main{max-width:960px;margin:0 auto;padding:28px 22px 60px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.stat{background:#fff;border:1.5px solid #e8e4de;border-radius:7px;padding:14px 16px;}
.sv{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#009d94;}
.sl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:3px;}
.pipe{background:#fff;border:1.5px solid #e8e4de;border-radius:7px;padding:15px 18px;margin-bottom:18px;}
.pipe-t{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.pipe-row{display:flex;border:1.5px solid #e8e4de;border-radius:6px;overflow:hidden;}
.ps{flex:1;padding:12px 14px;border-right:1.5px solid #e8e4de;text-align:center;}
.ps:last-child{border-right:none;}
.ps-l{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.ps-v{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.ps-s{font-size:12px;font-weight:600;margin-top:2px;}
.pcard{background:#fff;border:1.5px solid #e8e4de;border-radius:7px;padding:14px 18px;margin-bottom:10px;}
.pcard-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.pav{width:42px;height:42px;border-radius:7px;background:rgba(0,157,148,.12);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#009d94;flex-shrink:0;font-family:'Playfair Display',serif;}
.pinfo{flex:1;min-width:160px;}
.pname{font-weight:700;font-size:14px;color:#1a1a1a;margin-bottom:2px;}
.pmeta{font-size:11px;color:#aaa;}
.pact{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;display:inline-block;border:1.5px solid;}
.br{color:#888;border-color:#ddd;background:#fafaf8;}
.be{color:#009d94;border-color:rgba(0,157,148,.3);background:rgba(0,157,148,.08);}
.ba{color:#16a34a;border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.07);}
.bp{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08);}
.ssel{background:#fafaf8;border:1.5px solid #e0dbd4;color:#666;font-size:11px;padding:5px 8px;border-radius:5px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px;background:#fff;border:1.5px solid #e8e4de;border-radius:7px;}
/* FUP */
.fup-section{margin-top:12px;border-top:1.5px solid #f0ece6;padding-top:10px;}
.fup-lbl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.fup-row{display:flex;gap:6px;flex-wrap:wrap;}
.fup-box{flex:1;min-width:90px;border:1.5px solid #e8e4de;border-radius:6px;padding:9px 10px;background:#fafaf8;position:relative;transition:border .15s;}
.fup-box.done{border-color:#009d94;background:rgba(0,157,148,.05);}
.fup-box.pend{border-color:#f0c030;background:rgba(240,192,48,.06);}
.fup-num{font-size:10px;font-weight:700;color:#009d94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.fup-dt{width:100%;border:none;background:transparent;font-size:11px;color:#555;font-family:'DM Sans',sans-serif;margin-bottom:3px;outline:none;}
.fup-nt{width:100%;border:none;background:transparent;font-size:10px;color:#777;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.4;min-height:26px;}
.fup-dot{width:7px;height:7px;border-radius:50%;position:absolute;top:9px;right:9px;background:#e0dbd4;}
.fup-dot.done{background:#009d94;}
.fup-dot.pend{background:#f0c030;}
.fup-sts{display:flex;gap:8px;margin-top:5px;}
.fup-st{font-size:10px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:3px;}
/* Qualificação */
.qual-tabs{display:flex;gap:8px;margin-bottom:12px;}
.qual-tab{flex:1;padding:10px 8px;border-radius:6px;border:1.5px solid #e8e4de;background:#fafaf8;cursor:pointer;text-align:center;transition:all .15s;}
.qual-tab.on{background:#1f2d32;border-color:#1f2d32;}
.qual-tab-t{font-size:12px;font-weight:700;color:#555;}
.qual-tab.on .qual-tab-t{color:#009d94;}
.qual-tab-s{font-size:10px;color:#aaa;margin-top:2px;}
.qual-tab.on .qual-tab-s{color:rgba(255,255,255,.45);}
.qual-desc{background:#f8faf9;border-left:3px solid #009d94;border-radius:0 5px 5px 0;padding:12px 16px;font-size:13px;color:#2d3748;line-height:1.7;font-weight:500;margin-bottom:14px;}
/* Form */
.fcard{background:#fff;border:1.5px solid #e8e4de;border-radius:8px;overflow:hidden;}
.prog{height:4px;background:#e8e4de;}
.pf{height:100%;background:#009d94;transition:width .4s;}
.fbody{padding:26px 28px;}
.sey{font-size:10px;color:#009d94;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px;}
.stt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.ssb{font-size:12px;color:#aaa;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.lbl{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:block;margin-bottom:5px;}
input,select,textarea{background:#fafaf8;border:1.5px solid #e0dbd4;color:#1a1a1a;font-size:13px;padding:9px 12px;border-radius:5px;outline:none;width:100%;font-family:'DM Sans',sans-serif;transition:border .18s;}
input:focus,select:focus,textarea:focus{border-color:#009d94;background:#fff;}
.fld{margin-bottom:13px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px;}
.chip{padding:6px 13px;border-radius:5px;font-size:12px;font-weight:600;border:1.5px solid #e0dbd4;background:#fafaf8;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.chip.on{border-color:#009d94;background:rgba(0,157,148,.08);color:#009d94;}
.obj-chip{padding:6px 12px;border-radius:5px;font-size:12px;font-weight:500;border:1.5px solid #e0dbd4;background:#fafaf8;color:#666;cursor:pointer;display:inline-block;margin:3px 3px 0 0;transition:all .15s;font-family:'DM Sans',sans-serif;}
.obj-chip.on{border-color:#009d94;background:rgba(0,157,148,.08);color:#009d94;font-weight:600;}
.cin{background:#fafaf8;border:1.5px solid #e8e4de;border-radius:6px;padding:14px 16px;margin-bottom:13px;}
.mbt{flex:1;padding:15px 12px;border-radius:6px;cursor:pointer;text-align:center;border:1.5px solid #e0dbd4;background:#fafaf8;color:#888;font-weight:700;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .18s;}
.mbt.on{border-color:#009d94;border-width:2px;background:rgba(0,157,148,.08);color:#009d94;}
.fnav{display:flex;justify-content:space-between;margin-top:22px;padding-top:18px;border-top:1.5px solid #f0ece6;}
/* OnePage */
.op{background:#fff;border:1.5px solid #e8e4de;border-radius:8px;overflow:hidden;}
.ops{padding:22px 42px;border-bottom:2px solid #f0ece6;}
.ops:last-child{border-bottom:none;}
.opsa{background:#fafaf8;}
.opsh{display:flex;align-items:center;gap:10px;margin-bottom:15px;}
.opsn{font-size:10px;font-weight:700;color:#009d94;letter-spacing:.14em;min-width:22px;}
.opsl{flex:1;height:1.5px;background:#e8e4de;}
.opst{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;}
.res{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.8;color:#2d3748;border-left:3px solid #009d94;padding:13px 18px;background:#f8faf9;border-radius:0 5px 5px 0;font-weight:500;}
.ctx-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;}
.ctx-i{padding:10px 13px;background:#f4f2ee;border-radius:5px;border-left:2px solid #009d94;}
.ctx-k{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;font-weight:600;}
.ctx-v{font-size:13px;font-weight:600;color:#1a1a1a;}
.op-tag{font-size:11px;background:#f0faf8;border:1.5px solid rgba(0,157,148,.2);border-radius:3px;padding:3px 9px;color:#1a1a1a;display:inline-block;margin:2px;font-weight:500;}
.ok{display:flex;gap:10px;align-items:flex-start;padding:9px 13px;background:#f0faf8;border:1.5px solid #c8e8e5;border-radius:5px;margin-bottom:5px;font-size:13px;color:#222;line-height:1.6;}
.nok{display:flex;gap:10px;align-items:flex-start;padding:9px 13px;background:#fdf6f3;border:1.5px solid #e8cfc5;border-radius:5px;margin-bottom:5px;font-size:13px;color:#222;line-height:1.6;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.rc{background:#fff;border-radius:5px;padding:13px 15px;border:1.5px solid #e8e4de;border-top:2.5px solid #009d94;}
.rc-t{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.rc-d{font-size:12px;color:#888;line-height:1.6;}
.tcg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.tc{border-radius:6px;padding:11px 7px;text-align:center;border:1.5px solid #e8e4de;background:#fafaf8;}
.tc.hi{background:#009d94;border-color:#009d94;}
.tc-a{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:#e8e4de;}
.tc.hi .tc-a{background:rgba(255,255,255,.2);}
.tc-r{font-size:10px;font-weight:600;color:#555;line-height:1.4;}
.tc.hi .tc-r{color:#fff;}
.tc-sub{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;}
.ot{width:100%;border-collapse:collapse;font-size:12px;}
.ot th{padding:8px 11px;text-align:left;background:#f4f2ee;color:#555;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid #e0dbd4;}
.ot td{padding:9px 11px;border-bottom:1.5px solid #f0ece6;color:#333;}
.ot .hi{color:#009d94;font-weight:700;}
.ot .bold-row td{font-weight:700;color:#1a1a1a;background:#f4f2ee;}
.conv-pct{font-size:10px;color:#bbb;font-weight:400;margin-left:4px;}
.tnote{font-family:'DM Sans',sans-serif;font-size:14px;color:#2d3748;margin-top:13px;line-height:1.8;border-left:3px solid #009d94;padding:10px 16px;background:#f8faf9;font-weight:500;}
.esf{border:1.5px solid #e8e4de;border-radius:7px;overflow:hidden;margin-bottom:16px;}
.esf-header{background:#f4f2ee;padding:12px 16px;text-align:center;border-bottom:1.5px solid #e8e4de;}
.esf-header-t{font-size:10px;color:#009d94;font-weight:700;text-transform:uppercase;letter-spacing:.14em;margin-bottom:3px;}
.esf-header-s{font-family:'DM Sans',sans-serif;font-size:13px;color:#555;font-style:normal;font-weight:600;}
.esf-body{display:grid;grid-template-columns:1fr 1.5px 1fr 1.5px 1fr;}
.esf-div{background:#e8e4de;}
.esf-item{padding:18px 12px;text-align:center;}
.esf-v{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#009d94;line-height:1;}
.esf-l{font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}
.esf-s{font-size:11px;color:#aaa;margin-top:2px;}
.ib{background:#1f2d32;border-radius:8px;padding:36px 40px;text-align:center;border:2px solid #2d4048;position:relative;}
.ib-val{font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#ffffff;line-height:1;margin:8px 0;letter-spacing:-.02em;}
.ib-label{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.12em;font-weight:600;}
.ib-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:10px;}
.ib-validity{position:absolute;top:20px;right:24px;text-align:right;}
.ib-validity-l{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.ib-validity-v{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:rgba(255,255,255,.75);}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.ci2{padding:8px 0;border-bottom:1.5px solid #f0ece6;}
.ci2:nth-child(odd){padding-right:18px;border-right:1.5px solid #f0ece6;}
.ci2:nth-child(even){padding-left:18px;}
.ck2{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;font-weight:600;}
.cv2{font-size:12px;font-weight:600;color:#1a1a1a;}
.ct{font-size:11px;background:#fff;border:1.5px solid #e0dbd4;border-radius:3px;padding:4px 9px;color:#555;font-weight:500;display:inline-block;margin:2px;}
.ct-ativo{font-size:11px;background:#1f2d32;border:1.5px solid #009d94;border-radius:3px;padding:4px 9px;color:#009d94;font-weight:700;display:inline-block;margin:2px;}
.seg-title{font-size:10px;font-weight:700;color:#009d94;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1.5px solid #e8e4de;}
.ni{display:flex;gap:14px;align-items:flex-start;margin-bottom:11px;padding-bottom:11px;border-bottom:1.5px solid #f0ece6;}
.ni:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ni-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#009d94;min-width:26px;line-height:1;}
.ni-t{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.ni-d{font-size:12px;color:#777;line-height:1.6;}
.par{display:flex;border:1.5px solid #e8e4de;border-radius:6px;overflow:hidden;}
.pa{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;border-right:1.5px solid #f0ece6;text-align:center;}
.pa:last-child{border-right:none;}
.pa-d{font-size:10px;color:#555;margin-top:5px;font-weight:700;}
.jb{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 13px;background:#f4f2ee;border:1.5px solid #e0dbd4;border-radius:5px;margin-top:13px;font-size:12px;font-weight:600;color:#009d94;width:fit-content;}
.jp{display:none;margin-top:12px;padding:15px;background:#f9f7f4;border:1.5px solid #e8e4de;border-radius:5px;}
.jp.open{display:block;}
.jw{display:flex;gap:3px;align-items:flex-start;}
.jc{flex:1;}
.ja{padding:11px 3px;color:#009d94;font-size:13px;flex-shrink:0;}
.jn{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.jt{font-size:10px;color:#009d94;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.jl{font-size:11px;color:#666;line-height:1.7;padding-left:11px;position:relative;margin-bottom:2px;}
.jl::before{content:'·';position:absolute;left:2px;color:#009d94;font-weight:700;}
.of{background:#1f2d32;padding:18px 42px;display:flex;align-items:center;justify-content:space-between;border-top:3px solid #009d94;}
.ab{display:inline-block;background:#009d94;color:#fff;font-size:11px;font-weight:700;padding:4px 13px;border-radius:3px;letter-spacing:.06em;margin-bottom:11px;text-transform:uppercase;}
.rb{background:#fffbf0;border:1.5px solid #f0d080;border-radius:5px;padding:12px 15px;margin-top:12px;}
.rl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#a07820;margin-bottom:3px;}
.dg-ok{background:rgba(0,157,148,.06);border:1.5px solid rgba(0,157,148,.2);border-radius:5px;padding:9px 12px;margin-bottom:6px;font-size:12px;color:#1a1a1a;line-height:1.6;display:flex;gap:9px;}
.dg-ch{background:#fdf6f3;border:1.5px solid #e8cfc5;border-radius:5px;padding:9px 12px;margin-bottom:6px;font-size:12px;color:#1a1a1a;line-height:1.6;display:flex;gap:9px;}

.prop-num{font-size:10px;font-weight:700;color:#009d94;letter-spacing:.1em;text-transform:uppercase;margin-right:6px;}
.prop-ver{font-size:10px;font-weight:600;color:#aaa;border:1px solid #e0dbd4;border-radius:3px;padding:1px 6px;background:#fafaf8;}

.vend-filter{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.vend-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #e0dbd4;background:#fff;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.vend-tab.on{background:#1f2d32;border-color:#1f2d32;color:#009d94;}
.gmail-btn{background:#fff;border:1.5px solid #e0dbd4;color:#555;border-radius:5px;padding:6px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s;}
.gmail-btn:hover{border-color:#009d94;color:#009d94;}

/* Tagline capa */
.capa-tagline{font-size:13px;color:rgba(255,255,255,.55);font-style:italic;line-height:1.65;margin-bottom:18px;max-width:480px;}
/* Pergunta ROI */
.roi-pergunta{background:rgba(0,157,148,.1);border:1px solid rgba(0,157,148,.25);border-radius:6px;padding:14px 20px;margin-top:14px;display:flex;align-items:center;gap:14px;}
.roi-pergunta-icon{width:36px;height:36px;border-radius:50%;background:rgba(0,157,148,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.roi-pergunta-text{font-size:14px;color:rgba(255,255,255,.85);font-weight:500;line-height:1.5;}
.roi-pergunta-text strong{color:#009d94;}
/* Parceiros hierarquia */
.par-sf{flex:1.6;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 14px;border-right:1.5px solid #f0ece6;text-align:center;background:#f0faf8;}
.par-sf-badge{font-size:9px;font-weight:700;color:#009d94;background:rgba(0,157,148,.1);border:1px solid rgba(0,157,148,.25);border-radius:3px;padding:2px 8px;letter-spacing:.08em;text-transform:uppercase;margin-top:6px;display:inline-block;}
.par-right{flex:1;display:flex;flex-direction:column;}
.par-right .pa{border-right:none;border-bottom:1.5px solid #f0ece6;}
.par-right .pa:last-child{border-bottom:none;}
/* Separador Z-flow */
.z-connector{display:flex;align-items:center;justify-content:center;padding:4px 0;margin:0;}
.z-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,157,148,.25),transparent);}
.z-dot{width:6px;height:6px;border-radius:50%;background:#009d94;opacity:.4;margin:0 8px;flex-shrink:0;}
/* Ícones SVG time */
.tc-icon{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;background:#e8e4de;}

function calcDiag(d){
  const f=[],ch=[],cr=d.crescimento||[];
  if(cr.includes('Indicação'))f.push('Forte capital relacional — clientes satisfeitos atuam como promotores da marca');
  if(cr.includes('Inbound'))f.push('Presença digital ativa gerando demanda orgânica qualificada');
  if(cr.includes('Outbound'))f.push('Iniciativa de prospecção ativa com perfil hunter consolidado');
  if(d.icp==='muito_claro')f.push('ICP bem definido — direcionamento estratégico claro para prospecção');
  if(d.ciclo==='menos30'||d.ciclo==='30_60')f.push('Ciclo comercial favorável para aprendizado acelerado');
  if(d.previsibilidade==='baixa'||d.previsibilidade==='dependente')ch.push('Baixa previsibilidade de pipeline — crescimento dependente de variáveis externas');
  if(cr.includes('Indicação')&&!cr.includes('Outbound'))ch.push('Dependência do crescimento orgânico limita velocidade de escala');
  if(d.icp==='inexistente'||d.icp==='parcial')ch.push('ICP indefinido compromete eficiência da prospecção e aumenta o CAC');
  if(!d.crm||d.crm==='nenhum')ch.push('Ausência de CRM dificulta rastreabilidade e previsibilidade do pipeline');
  if(d.ciclo==='mais120')ch.push('Ciclo longo exige estrutura robusta de nutrição e gestão de médio prazo');
  const resumo=`${d.empresa||'A empresa'} apresenta ${f.length} ponto(s) de força e ${ch.length} desafio(s) crítico(s). ${d.previsibilidade==='muito_previsivel'?'A operação demonstra maturidade comercial relevante, com clara capacidade de expansão.':'A operação ainda depende de fatores relacionais para crescer — existe janela estratégica para construção de motor de demanda previsível e escalável com a Escalar.'}`;
  return{f,ch,resumo};
}

function saveFup(pid,n,key,val){
  const p=proposals.find(x=>x.id===pid||x.id==pid);if(!p)return;
  if(!p.fups)p.fups={};
  if(!p.fups[n])p.fups[n]={};
  p.fups[n][key]=val;
  sv();
  const box=document.getElementById('fup-'+pid+'-'+n);
  if(!box)return;
  const fup=p.fups[n];
  const st=fup.status;
  box.className='fup-box'+(st==='done'?' done':st==='pend'?' pend':'');
  const dot=box.querySelector('.fup-dot');
  if(dot)dot.className='fup-dot'+(st==='done'?' done':st==='pend'?' pend':'');
}

function addDays(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0]; // YYYY-MM-DD para input[type=date]
}

function autoFupDates(p){
  // Só preenche se o FUP ainda não tem data definida
  const dias=[2,5,7,15,20];
  if(!p.fups)p.fups={};
  dias.forEach((d,i)=>{
    const n=i+1;
    if(!p.fups[n])p.fups[n]={};
    if(!p.fups[n].date){
      p.fups[n].date=addDays(d);
      p.fups[n].status=p.fups[n].status||'pend';
    }
  });
}

function setSt(id,s){
  const p=proposals.find(x=>x.id===id);
  if(p){
    p.status=s;
    // Ao marcar como enviada, sugerir datas de FUP automaticamente
    if(s==='enviada') autoFupDates(p);
    sv();syncToSheets(p);re();
  }
}
function dupP(id){const p=proposals.find(x=>x.id===id);if(!p)return;const n=JSON.parse(JSON.stringify(p));n.id=Date.now();n.ver=(p.ver||1)+1;n.status='rascunho';n.created=fmtD();n.fups={};proposals.unshift(n);sv();re();}

function sendGmail(id){
  const p=proposals.find(x=>x.id===id);if(!p)return;

    (p.valor?'• Investimento: '+p.valor+'/mês\n':'')+

  );

function gerarLink(id){
  const p=proposals.find(x=>x.id===id||x.id==id);
  if(!p){alert('Salve a proposta na planilha antes de gerar o link (clique em Enviar Tudo).');return;}
  // Sincronizar primeiro
  syncToSheets(p);
  // Gerar URL pública
  const url=SHEETS_URL+'?id='+id;
  // Copiar para clipboard
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      const btn=document.getElementById('link-btn-'+id);
      if(btn){
        btn.textContent='✓ Link copiado!';
        btn.classList.add('link-copied');
        setTimeout(function(){btn.textContent='🔗 Gerar Link';btn.classList.remove('link-copied');},3000);
      }
    });
  } else {
    // fallback
    const el=document.createElement('textarea');
    el.value=url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('Link copiado: '+url);
  }
}

function saveG(){
  if(!Array.isArray(F.crescimento))F.crescimento=[];

  if(F.status==='enviada') autoFupDates(F);

}
